<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" role="img" aria-label="ALUWORLD LIMITED">
  <defs>
    <linearGradient id="bronze4a" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffcf94"/><stop offset="1" stop-color="#ee942d"/>
    </linearGradient>
    <linearGradient id="bronze4b" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ee942d"/><stop offset="1" stop-color="#8a5410"/>
    </linearGradient>
    <linearGradient id="bronze4c" x1="1" y1="0" x2="0" y2="1">
      <stop stop-color="#ffb969"/><stop offset="1" stop-color="#b8730f"/>
    </linearGradient>
  </defs>
  <!-- Faceted diamond: cut-glass motif made of angular shards -->
  <g>
    <polygon points="104,10 180,95 104,120 28,95" fill="url(#bronze4a)"/>
    <polygon points="104,120 180,95 104,210 60,150" fill="url(#bronze4b)"/>
    <polygon points="104,120 28,95 44,150 104,210" fill="url(#bronze4c)"/>
    <polygon points="104,10 28,95 104,120" fill="#fff" opacity=".18"/>
  </g>
  <text x="228" y="122" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="600" font-size="88" letter-spacing="-1.5">
    <tspan fill="#ffcf94">ALU</tspan><tspan fill="#fcfaf7">WORLD</tspan>
  </text>
  <text x="230" y="162" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="24" letter-spacing="6" fill="#ee942d" opacity=".9">LIMITED</text>
</svg>
